databases:
  - name: dataquery-ai-db
    plan: free
    databaseName: dataquery_ai
    user: dataquery_ai_user

services:
  - type: web
    name: dataquery-ai
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/status
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DEFAULT_DATABASE
        value: postgresql
      - key: DATABASE_URL
        fromDatabase:
          name: dataquery-ai-db
          property: connectionString
      - key: AUTH_DATABASE_URL
        fromDatabase:
          name: dataquery-ai-db
          property: connectionString
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: DEFAULT_PROVIDER
        value: groq
      - key: FALLBACK_PROVIDER
        value: gemini
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
